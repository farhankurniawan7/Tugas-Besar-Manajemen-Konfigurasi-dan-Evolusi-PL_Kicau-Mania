# =============================================================================
#  CI/CD Pipeline - Simple Calculator
#  Implements the 4 required components, split into 5 jobs (one per member):
#    1. continuous-integration  -> Continuous Integration   (Anggota 1)
#    2. continuous-testing      -> Continuous Testing        (Ahmad Alfarizi)
#    3. continuous-inspection   -> Continuous Inspection     (Anggota 3)
#    4. continuous-delivery     -> Continuous Delivery       (Muhammad Daniel Anugrah Pratama)
#    5. continuous-deployment   -> Continuous Deployment     (Farhan Kurniawan)
# =============================================================================
name: CI/CD Pipeline

# ----- Trigger events -------------------------------------------------------
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ----- Shared environment variables -----------------------------------------
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  # Run the JavaScript-based actions on Node.js 24 (silences the Node 20
  # deprecation warning; Node 24 becomes the runner default on 16 Jun 2026).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ----- Permissions (needed by the deployment job to create a Release) -------
permissions:
  contents: write

jobs:
  # ===========================================================================
  # KOMPONEN 1 - CONTINUOUS INTEGRATION (Anggota 1)
  # Compile the source code on every push / pull request.
  # ===========================================================================
  continuous-integration:
    name: 1. Continuous Integration (Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Compile the project
        run: mvn -B clean compile

  # ===========================================================================
  # KOMPONEN 2 - CONTINUOUS TESTING (Ahmad Alfarizi)
  # Run all unit tests + generate a JaCoCo code-coverage report.
  # Runs only after Continuous Integration succeeds.
  # ===========================================================================
  continuous-testing:
    name: 2. Continuous Testing (Unit Tests + Coverage)
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Run unit tests (JUnit) and generate coverage (JaCoCo)
        run: mvn -B test

      - name: Upload test & coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-coverage-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/

  # ===========================================================================
  # KOMPONEN 3 - CONTINUOUS INSPECTION (Anggota 3)
  # Static code analysis: SpotBugs (bug detection, gates the build) +
  # Checkstyle (code-style report). Runs after Continuous Integration.
  # ===========================================================================
  continuous-inspection:
    name: 3. Continuous Inspection (Static Analysis)
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: SpotBugs - detect potential bugs (fails build on findings)
        run: mvn -B clean compile spotbugs:check

      - name: Checkstyle - inspect code style
        run: mvn -B checkstyle:check

      - name: Upload inspection reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspection-reports
          path: |
            target/spotbugsXml.xml
            target/checkstyle-result.xml

  # ===========================================================================
  # KOMPONEN 4 - CONTINUOUS DELIVERY (Muhammad Daniel Anugrah Pratama)
  # Package the application into a runnable JAR (the deployable artifact)
  # and publish it as a build artifact. Runs only after BOTH testing and
  # inspection pass -> the artifact is always "ready to deploy".
  # ===========================================================================
  continuous-delivery:
    name: 4. Continuous Delivery (Package Artifact)
    runs-on: ubuntu-latest
    needs: [ continuous-testing, continuous-inspection ]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Package application into JAR
        run: mvn -B package -DskipTests

      - name: Upload deployable JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  # ===========================================================================
  # KOMPONEN 5 - CONTINUOUS DEPLOYMENT (Farhan Kurniawan)
  # Automatically publish the delivered JAR as a public GitHub Release.
  # Guard: only on a push to main (never on pull requests), so production
  # releases are created only for code that has been merged into main.
  # ===========================================================================
  continuous-deployment:
    name: 5. Continuous Deployment (Publish Release)
    runs-on: ubuntu-latest
    needs: continuous-delivery
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Download delivered JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: application-jar
          path: target

      - name: Publish GitHub Release with the JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: target/*.jar
